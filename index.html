<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel = "stylesheet" href= "style.css">
    <link rel = "icon" type = "image/png" href = "movie.png">
</head>
<body>
    <div class = "title">Movie Catalogue</div>
    <div class = " searchsect">
        <input type="text" id = "search" class ="search" placeholder="Search Movies">
        <select class = "filter" id ="genre">
            <option>Superhero</option>
            <option>Biography</option>
            <option>Action</option>
            <option>Drama</option>
            <option>Animation</option>
            <option>Thriller</option>
            <option>Sci-Fi</option>
        </select>
        <button class = "submit" id ="submit">
            <img src = "search.png">
        </button>
    </div>
    <div class = "listbar" id = "listbar">
        <div class = "grids" id = "grids">
        </div>
</div>
    
    <script src = "script.js"></script>
</body>
</html>
